
dataloader:
  batch_size: 64                
  num_workers: 8                
  shuffle: True

training:
  epochs: 20                    
  patience: 5    
  mixed_precision: True         

optimizer:
  name: adamw
  lr: 0.0003                    
  weight_decay: 0.0005          


scheduler:
  name: reduce_on_plateau
  factor: 0.1                   
  patience: 5
  min_lr: 1e-6

loss:
  name: cross_entropy
  class_weights: null
  label_smoothing: 0.05         

metrics:
  - accuracy
  - f1_macro

# Logging & saving
output_dir: results
checkpoint_dir: checkpoints